name: gena
description: "Gena AI"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_gemma: ^0.15.1
  drift: ^2.30.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  flutter_dotenv: ^6.0.1
  file_picker: ^10.3.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  logger: ^2.7.0
  gpt_markdown: ^1.1.7
  shared_preferences: ^2.5.5
  flutter_highlight: ^0.7.0
  flutter_animate: ^4.5.2
  fluttertoast: ^9.0.0
  flutter_spinkit: ^5.2.2
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.7
  hugeicons: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.30.1
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/  # JSON data file
    - assets/images/  # JSON data file